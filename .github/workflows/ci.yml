name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -Xswiftc -swift-version -Xswiftc 5

      - name: Test
        run: swift test -Xswiftc -swift-version -Xswiftc 5
