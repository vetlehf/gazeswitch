name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      APP_NAME: GazeSwitch
      APP_BUNDLE: build/GazeSwitch.app
      ENTITLEMENTS: GazeSwitch.entitlements
      SWIFT_FLAGS: -Xswiftc -swift-version -Xswiftc 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Build release binary
        run: swift build -c release $SWIFT_FLAGS

      - name: Create app bundle
        run: |
          rm -rf $APP_BUNDLE
          mkdir -p $APP_BUNDLE/Contents/MacOS
          mkdir -p $APP_BUNDLE/Contents/Resources
          cp .build/release/$APP_NAME $APP_BUNDLE/Contents/MacOS/$APP_NAME
          cp Sources/GazeSwitch/Resources/Info.plist $APP_BUNDLE/Contents/Info.plist
          cp Sources/GazeSwitch/Resources/AppIcon.icns $APP_BUNDLE/Contents/Resources/AppIcon.icns

      - name: Sign with Developer ID
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: |
          codesign --force --sign "$SIGN_IDENTITY" \
            --entitlements $ENTITLEMENTS \
            --deep --options runtime --timestamp \
            $APP_BUNDLE
          codesign --verify --verbose $APP_BUNDLE

      - name: Ad-hoc sign (fallback)
        if: env.MACOS_CERTIFICATE == ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: codesign --force --sign - --entitlements $ENTITLEMENTS --deep $APP_BUNDLE

      - name: Create DMG
        run: |
          DMG_NAME="${APP_NAME}-${{ steps.version.outputs.VERSION }}.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder $APP_BUNDLE -ov -format UDZO "build/$DMG_NAME"

      - name: Notarize
        if: env.NOTARIZE_APPLE_ID != ''
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
        run: |
          DMG_NAME="${APP_NAME}-${{ steps.version.outputs.VERSION }}.dmg"
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARIZE_TEAM_ID }}" \
            --password "${{ secrets.NOTARIZE_PASSWORD }}"
          xcrun notarytool submit "build/$DMG_NAME" --keychain-profile "AC_PASSWORD" --wait
          xcrun stapler staple "build/$DMG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/GazeSwitch-*.dmg
          generate_release_notes: true
